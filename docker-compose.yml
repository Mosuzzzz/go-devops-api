version: '3.8'

services:
  # ส่วนของฐานข้อมูล
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    restart: always

  # ส่วนของ Go API
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:password123@db:5432/mydb?sslmode=disable
    depends_on:
      - db
    restart: always