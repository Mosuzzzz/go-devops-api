services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # ${VARIABLE} คือการบอกให้ Docker ไปดึงค่าจากระบบมาใส่
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      # สำหรับ DB เราอาจจะแยก Secret เป็นตัวๆ ก็ได้
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"