name: Local Self-Hosted Deploy with Test

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: self-hosted  # หรือใช้ ubuntu-latest ก็ได้สำหรับขั้นตอน Test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Unit Tests
        run: go test ./... -v

  deploy:
    needs: test # <--- บรรทัดสำคัญ! บอกว่าต้อง Test ผ่านก่อนถึงจะเริ่ม Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploying App
        run: |
          cd ~/user/golang/go-devops-api
          git pull origin master
          docker compose up -d --build