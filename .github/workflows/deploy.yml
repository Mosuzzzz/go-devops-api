name: Local Self-Hosted Deploy with Test

on:
  push:
    branches: [ "master" ]

# ✅ ย้ายมาไว้ตรงนี้ (Global Level) ทุก Jobs จะใช้ค่าเหล่านี้ได้หมด
env:
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DATABASE_URL: ${{ secrets.DB_URL }}

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        run: go test ./... -v

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Deploying App
        run: |
          cd ~/user/golang/go-devops-api
          git pull origin master
          
          # เรียกใช้ตัวแปรที่เราประกาศไว้ที่ Global Env ด้านบน
          DATABASE_URL="$DATABASE_URL" DB_PASSWORD="$DB_PASSWORD" docker compose up -d --build
    
      - name: Send Discord Notification
        if: always() # รันเสมอไม่ว่าจะสำเร็จหรือพัง
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🚀 Deployment Report"
          description: "Project: go-devops-api | Branch: master"
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}