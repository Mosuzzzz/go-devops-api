name: Go DevOps CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: self-hosted # ใช้เครื่อง VirtualBox ของเราเอง
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Unit Tests
        run: |
          go test ./... -v
        # ถ้า Test พัง ขั้นตอนต่อไปจะไม่ทำงานทันที

      - name: Create .env file
        run: |
          # สร้างไฟล์ .env จากค่าที่คุณอาจจะตั้งไว้ใน GitHub Secrets (ถ้ามี)
          echo "APP_ENV=production" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          
      - name: Build and Deploy with Docker
        run: |
          # ใช้คำสั่งในเครื่อง VM โดยตรง
          docker compose down --remove-orphans
          docker compose up -d --build
          
      - name: Cleanup Old Images
        run: |
          docker image prune -f