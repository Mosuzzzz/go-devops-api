name: Local Self-Hosted Deploy with Test

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        run: go test ./... -v

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Deploying App
        env:
          # ดึงค่าจาก GitHub Secrets มาใส่ใน Environment ของ Runner
          DATABASE_URL: ${{ secrets.DB_URL }}
        run: |
          cd ~/user/golang/go-devops-api
          git pull origin master
          
          # ส่งค่า Environment เข้าไปใน Docker Compose ตอนรัน
          DATABASE_URL="$DATABASE_URL" docker compose up -d --build
  env:
    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}